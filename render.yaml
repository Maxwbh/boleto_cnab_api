# Configuração para Render.com Free Tier
# Documentação: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: boleto-cnab-api
    runtime: docker
    region: oregon
    plan: free

    # Dockerfile principal — imagem Prawn (sem GhostScript), mais leve e
    # com menor uso de memória. Gera PDF (boleto, PIX e carnê).
    # Para imagens JPG/PNG/TIF, troque para ./Dockerfile.rghost.
    dockerfilePath: ./Dockerfile
    dockerContext: .

    # Deploy automático
    autoDeploy: true

    # Branch principal
    branch: master

    # Health check (Render usa este path, não o HEALTHCHECK do Dockerfile)
    healthCheckPath: /api/health

    # Variáveis de ambiente otimizadas para FREE TIER (512MB RAM)
    # IMPORTANTE: valores no Render são strings — sempre entre aspas.
    envVars:
      # Ambiente de produção
      - key: RACK_ENV
        value: "production"

      # Puma — 1 worker para economizar memória
      - key: PUMA_WORKERS
        value: "1"

      # Threads — começa em 1, máximo 5
      - key: PUMA_MIN_THREADS
        value: "1"

      - key: PUMA_MAX_THREADS
        value: "5"

      # jemalloc — allocator de baixa fragmentação (musl/Alpine).
      # Já vem ativado via LD_PRELOAD no Dockerfile; este tuning reforça
      # a devolução de memória ociosa ao SO no free tier.
      - key: MALLOC_CONF
        value: "background_thread:true,narenas:2,dirty_decay_ms:1000,muzzy_decay_ms:0"

      # Tuning de GC do Ruby para baixa memória
      - key: RUBY_GC_HEAP_GROWTH_FACTOR
        value: "1.1"

      - key: RUBY_GC_MALLOC_LIMIT
        value: "16777216"

      - key: RUBY_GC_OLDMALLOC_LIMIT
        value: "16777216"

      # Nível de log
      - key: LOG_LEVEL
        value: "info"

      # Template padrão de geração de PDF (imagem principal = Prawn).
      # Já definido no Dockerfile; explícito aqui para clareza.
      - key: BOLETO_TEMPLATE
        value: "prawn"

      # Timeout de worker do Puma (evita kills durante cold start)
      - key: PUMA_WORKER_TIMEOUT
        value: "60"
