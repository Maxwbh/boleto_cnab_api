services:
  # Padrão: usa RGhost + GhostScript
  boleto_api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9292:9292"
    environment:
      - RACK_ENV=production
      - PORT=9292
    volumes:
      - ./lib:/usr/src/app/lib
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9292/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Variante Prawn: sem GhostScript, imagem menor, apenas PDF
  # Uso: docker compose --profile prawn up boleto_api_prawn
  boleto_api_prawn:
    build:
      context: .
      dockerfile: Dockerfile.prawn
    ports:
      - "9292:9292"
    environment:
      - RACK_ENV=production
      - PORT=9292
      - BOLETO_TEMPLATE=prawn
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9292/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - prawn

  # Testes: docker compose --profile test run --rm test
  test:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "gem install rspec rack-test --no-document && rspec --format documentation"
    volumes:
      - ./spec:/usr/src/app/spec
      - ./lib:/usr/src/app/lib
    environment:
      - RACK_ENV=test
      - BUNDLE_WITHOUT=
    profiles:
      - test
