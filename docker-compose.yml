services:
  # Padrão: imagem principal focada em Prawn (sem GhostScript, PDF-only).
  boleto_api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9292:9292"
    environment:
      - RACK_ENV=production
      - PORT=9292
      - BOLETO_TEMPLATE=prawn
    volumes:
      - ./lib:/usr/src/app/lib
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9292/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Variante completa com GhostScript (RGhost): também gera JPG/PNG/TIF.
  # Uso: docker compose --profile rghost up boleto_api_rghost
  boleto_api_rghost:
    build:
      context: .
      dockerfile: Dockerfile.rghost
    ports:
      - "9292:9292"
    environment:
      - RACK_ENV=production
      - PORT=9292
      - BOLETO_TEMPLATE=rghost
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9292/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - rghost

  # Testes: docker compose --profile test run --rm test
  test:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "gem install rspec rack-test --no-document && rspec --format documentation"
    volumes:
      - ./spec:/usr/src/app/spec
      - ./lib:/usr/src/app/lib
    environment:
      - RACK_ENV=test
      - BUNDLE_WITHOUT=
    profiles:
      - test
